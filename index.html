<style>
:root{
  --bleu:#0A3D5C;--teal:#1D9E75;--eau:#5DCAA5;--mousse:#9FE1CB;
  --soleil:#F5C842;--sable:#F5ECD7;--nuit:#05202F;
  --surf:#1A6B9A;--surf-light:#E6F1FB;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f7;color:#05202F}
.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bleu);padding:12px 16px 10px;color:#fff;text-align:center}
.logo-txt{font-family:Georgia,serif;font-size:24px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;letter-spacing:3px;color:var(--mousse);margin-top:2px}
.mode-bar{display:flex;background:var(--bleu);padding:0 12px 12px;gap:8px}
.mode-btn{flex:1;padding:9px;border-radius:12px;border:1.5px solid rgba(255,255,255,.25);font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:rgba(255,255,255,.6);background:transparent;transition:all .15s;font-family:inherit}
.mode-btn.on{background:#fff;color:var(--bleu);border-color:#fff}
.lieux{background:#fff;padding:10px 12px;border-bottom:1px solid #e8edf0;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.lieux::-webkit-scrollbar{display:none}
.cb{display:inline-block;padding:6px 13px;border-radius:20px;border:1.5px solid #dde4ea;font-size:13px;color:#4a6070;cursor:pointer;margin-right:6px;background:#fff;font-weight:500}
.cb.on-bassin{background:var(--bleu);color:#fff;border-color:var(--bleu)}
.cb.on-ocean{background:var(--surf);color:#fff;border-color:var(--surf)}
.profiles{display:flex;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid #e8edf0}
.pb{flex:1;padding:9px 4px;text-align:center;border-radius:10px;border:1.5px solid #dde4ea;font-size:12px;color:#4a6070;cursor:pointer;background:#fff;font-weight:500;font-family:inherit}
.pb.on-bassin{border-color:var(--teal);color:var(--bleu);background:#E1F5EE}
.pb.on-ocean{border-color:var(--surf);color:var(--surf);background:var(--surf-light)}
main{flex:1;padding:12px}
.verdict{background:#fff;border-radius:18px;padding:20px 16px;text-align:center;margin-bottom:10px;box-shadow:0 2px 12px rgba(10,61,92,.08)}
.v-em{font-size:52px;line-height:1;margin-bottom:6px;display:block}
.v-txt{font-size:22px;font-weight:700;color:var(--bleu);margin-bottom:4px}
.v-cd{font-size:15px;font-weight:600;margin-top:6px;padding:7px 16px;border-radius:10px;display:inline-block}
.cd-g{background:#E1F5EE;color:var(--teal)}
.cd-o{background:#FAEEDA;color:#9a6500}
.cd-r{background:#FCEBEB;color:#c0392b}
.conseil{border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.6;margin-bottom:10px;border-left:4px solid}
.conseil.g{background:#E1F5EE;border-color:var(--teal);color:#0a4a2a}
.conseil.o{background:#FAEEDA;border-color:#EF9F27;color:#6b4400}
.conseil.r{background:#FCEBEB;border-color:#E24B4A;color:#6b1010}
/* ALERTE SÉCURITÉ */
.alerte{background:#FFF3CD;border:1.5px solid #FFC107;border-radius:12px;padding:11px 14px;font-size:13px;color:#6b4400;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.fenetre-card{background:#fff;border-radius:14px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 6px rgba(10,61,92,.06)}
.fen-title{font-size:12px;font-weight:600;color:var(--bleu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.fen-slots{display:flex;gap:8px;flex-wrap:wrap}
.fen-slot{flex:1;min-width:80px;background:#f4f7fa;border-radius:10px;padding:10px;text-align:center;border:1.5px solid transparent}
.fen-slot.active{background:#E1F5EE;border-color:var(--teal)}
.fen-slot.passed{opacity:.5}
.fen-slot-lbl{font-size:10px;color:#7a8e9a;margin-bottom:3px}
.fen-slot-time{font-size:14px;font-weight:700;color:var(--bleu);font-family:monospace}
.fen-slot-info{font-size:11px;color:#8a9eaa;margin-top:2px}
.barre-card{background:#fff;border-radius:14px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 6px rgba(10,61,92,.06)}
.activites{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:0 1px 6px rgba(10,61,92,.06)}
.act-title{font-size:12px;font-weight:600;color:var(--bleu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.act-item{font-size:13px;color:#2d4a5c;padding:5px 0;border-bottom:1px solid #f0f4f7}
.act-item:last-child{border-bottom:none;padding-bottom:0}
.courbe-card{background:#fff;border-radius:14px;padding:14px 14px 10px;margin-bottom:10px;box-shadow:0 1px 6px rgba(10,61,92,.06)}
.time-axis{display:flex;justify-content:space-between;font-size:10px;color:#8a9eaa;margin-top:4px}
.tide-boxes{display:flex;gap:8px;margin-top:12px}
.tb{flex:1;background:#f4f7fa;border-radius:10px;padding:10px;text-align:center}
.tb-l{font-size:10px;color:#7a8e9a;margin-bottom:3px}
.tb-v{font-size:16px;font-weight:700;color:var(--bleu);font-family:monospace}
.tb-s{font-size:11px;color:#8a9eaa;margin-top:2px}
.bonplan{background:linear-gradient(135deg,#fff8e6,#fffdf5);border:1.5px solid var(--soleil);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.bonplan-icon{font-size:28px;flex-shrink:0}
.bonplan-txt{font-size:12px;color:#6b4400;line-height:1.5}
.bonplan-txt strong{color:var(--bleu);display:block;font-size:13px;margin-bottom:2px}
.bonplan-cta{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;text-decoration:none;display:inline-block}
.rfbtn{width:100%;padding:12px;border-radius:12px;border:1.5px solid #dde4ea;background:#fff;color:#4a6070;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:10px;font-family:inherit}
.shom-badge{text-align:center;font-size:10px;color:#8a9eaa;margin-bottom:8px}
.shom-badge span{background:#f4f7fa;border-radius:20px;padding:3px 10px}
footer{background:var(--bleu);color:var(--mousse);text-align:center;padding:14px;font-size:11px;line-height:1.8}
footer a{color:var(--soleil);text-decoration:none}
</style>
</head>

// ── UTILITAIRES ───────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0')}
function fmtH(d){return pad(d.getHours())+':'+pad(d.getMinutes())}
function fmtCD(min){
  min=Math.abs(min);
  const h=Math.floor(min/60),m=Math.round(min%60);
  return h>0?`${h}h${pad(m)}`:`${m} min`;
}
function dateKey(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function parseHeure(str, baseDate, offMin=0){
  if(!str) return null;
  const [h,m]=str.split(':').map(Number);
  const d=new Date(baseDate);
  d.setHours(h,m+offMin,0,0);
  return d;
}

// ── INTERPOLATION MARÉE ───────────────────────────────────
// Construit une série horaire interpolée à partir des 4 points SHOM du jour
// Utilise une courbe sinusoïdale entre chaque point basse→haute→basse
function buildSerieFromSHOM(shomData, offMin){
  if(!shomData) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const tomorrow=new Date(today); tomorrow.setDate(tomorrow.getDate()+1);

  // Récupère les données du lendemain aussi pour prolonger
  const keyTomorrow=dateKey(tomorrow);
  const shomTomorrow=SHOM[keyTomorrow];

  // Construit la liste des points clés (basses et hautes) sur 36h
  const points=[];
  function addPoints(data, baseDate){
    if(!data) return;
    const [hBM,hBMh, hHM,hHMh,cHM, hBS,hBSh, hHS,hHSh,cHS]=data;
    const bm=parseHeure(hBM,baseDate,offMin);
    const hm=parseHeure(hHM,baseDate,offMin);
    const bs=parseHeure(hBS,baseDate,offMin);
    const hs=parseHeure(hHS,baseDate,offMin);
    if(bm) points.push({t:bm,h:hBMh,haute:false});
    if(hm) points.push({t:hm,h:hHMh,haute:true,coeff:cHM});
    if(bs) points.push({t:bs,h:hBSh,haute:false});
    if(hs){
      // La haute du soir peut être le lendemain 0h-2h
      const hsCopy=new Date(hs);
      if(hsCopy.getHours()<6 && baseDate.getTime()===today.getTime()){
        hsCopy.setDate(hsCopy.getDate()+1);
      }
      points.push({t:hsCopy,h:hHSh,haute:true,coeff:cHS});
    }
  }
  addPoints(shomData,today);
  if(shomTomorrow) addPoints(shomTomorrow,tomorrow);

  points.sort((a,b)=>a.t-b.t);
  if(points.length<2) return null;

  // Interpolation sinusoïdale entre points
  const serie=[];
  const startT=new Date(today);
  const endT=new Date(today); endT.setHours(23,59,0,0);

  for(let t=new Date(startT); t<=endT; t=new Date(t.getTime()+5*60000)){
    // Trouve les deux points encadrants
    let i=0;
    while(i<points.length-1 && points[i+1].t<=t) i++;
    if(i>=points.length-1){
      serie.push({time:new Date(t),h:points[points.length-1].h});
      continue;
    }
    const p0=points[i], p1=points[i+1];
    const progress=(t-p0.t)/(p1.t-p0.t);
    // Interpolation cosinusoïdale (lisse)
    const mu=(1-Math.cos(progress*Math.PI))/2;
    const h=p0.h*(1-mu)+p1.h*mu;
    serie.push({time:new Date(t),h:Math.max(0,h)});
  }
  return {serie, points};
}

// ── FENÊTRE UTILE ─────────────────────────────────────────
function getFenetreUtile(serie, seuil){
  if(!serie) return{debut:null,fin:null};
  const above=serie.filter(p=>p.h>=seuil);
  if(!above.length) return{debut:null,fin:null};
  // Vérifie que c'est une vraie fenêtre (<22h)
  const debut=above[0].time;
  const fin=above[above.length-1].time;
  if((fin-debut)/60000>22*60) return{debut:null,fin:null};
  return{debut,fin};
}

function getNiveauPct(serie, seuil, now){
  if(!serie||!serie.length) return 0;
  const hMin=Math.min(...serie.map(p=>p.h));
  const hMax=Math.max(...serie.map(p=>p.h));
  const hNow=serie.reduce((prev,cur)=>Math.abs(cur.time-now)<Math.abs(prev.time-now)?cur:prev).h;
  const pct=Math.round((hNow-hMin)/(hMax-hMin)*100);
  const seuilPct=Math.round((seuil-hMin)/(hMax-hMin)*100);
  return{pct:Math.max(1,Math.min(99,pct)), seuilPct:Math.max(10,Math.min(90,seuilPct))};
}

// ── VERDICT BASSIN ────────────────────────────────────────
function verdictBassin(serie, points, now, pid){
  const seuil=SEUILS[pid]||2.0;
  const fen=getFenetreUtile(serie,seuil);
  const hNow=serie?serie.reduce((prev,cur)=>Math.abs(cur.time-now)<Math.abs(prev.time-now)?cur:prev).h:0;
  const inWindow=hNow>=seuil;
  const montee=serie&&serie.length>6?(serie[Math.floor(serie.length/2+1)].h>serie[Math.floor(serie.length/2-1)].h):true;

  // Prochaine haute/basse
  const futurePoints=points?points.filter(p=>p.t>now):[];
  const nextH=futurePoints.find(p=>p.haute);
  const nextB=futurePoints.find(p=>!p.haute);
  const prevH=points?[...points].reverse().find(p=>p.haute&&p.t<=now):null;

  // Alerte bateau : si en fenêtre mais eau qui descend → prévoir retour
  const alerteBateau=pid==='bateau'&&inWindow&&!montee&&fen.fin?
    `⚠️ Eau en descente — prévoir le retour avant ${fmtH(fen.fin)} !`:null;

  if(inWindow){
    const minLeft=fen.fin?(fen.fin-now)/60000:null;
    return{
      statut:'oui',emoji:'🟢',texte:'Oui, fonce !',
      cd:minLeft?`encore ${fmtCD(minLeft)} de bonne eau`:'eau présente',
      classe:'g',
      conseil:pid==='bateau'
        ?`Tirant d'eau suffisant. ${fen.fin?'Fenêtre jusqu\'à '+fmtH(fen.fin)+'.':''}`
        :`L'eau est là ! ${fen.debut&&fen.fin?'Bonne eau de '+fmtH(fen.debut)+' à '+fmtH(fen.fin)+'.':''}`,
      alerte:alerteBateau, fen, nextH, nextB, prevH
    };
  }

  // Pas encore / plus
  const minToGood=fen.debut&&fen.debut>now?(fen.debut-now)/60000:null;
  if(minToGood&&minToGood<240){
    return{
      statut:'bientot',emoji:'🟡',texte:'Bientôt !',
      cd:`eau praticable dans ${fmtCD(minToGood)}`,
      classe:'o',
      conseil:pid==='bateau'
        ?`Dans ${fmtCD(minToGood)} tu pourras appareiller. ${fen.fin?'Jusqu\'à '+fmtH(fen.fin)+'.':''}`
        :`Dans ${fmtCD(minToGood)} l'eau sera suffisante. ${fen.fin?'Bonne eau jusqu\'à '+fmtH(fen.fin)+'.':''}`,
      alerte:null, fen, nextH, nextB, prevH
    };
  }

  return{
    statut:'non',emoji:'🔴',texte:'Pas encore...',
    cd:minToGood?`bonne eau dans ${fmtCD(minToGood)}`:'marée basse — ramassage de coques 🦪',
    classe:'r',
    conseil:pid==='bateau'
      ?`Tirant insuffisant.${minToGood?' Fenêtre dans '+fmtCD(minToGood)+'.':''} Ne pas sortir.`
      :`Eau trop basse pour se baigner.${minToGood?' La prochaine fenêtre est dans '+fmtCD(minToGood)+'.':''} Profite de l'estran !`,
    alerte:null, fen, nextH, nextB, prevH
  };
}

// ── VERDICT SURF ──────────────────────────────────────────
function verdictSurf(points, now){
  const prevB=points?[...points].reverse().find(p=>!p.haute&&p.t<=now):null;
  const nextB=points?points.find(p=>!p.haute&&p.t>now):null;
  const nextH=points?points.find(p=>p.haute&&p.t>now):null;
  if(prevB){
    const ms=(now-prevB.t)/60000;
    if(ms>=0&&ms<180){
      return{statut:'oui',emoji:'🟢',texte:'Fonce surfer !',cd:`encore ${fmtCD(180-ms)} de bonne session`,classe:'g',phase:`Montée +${Math.round(ms)} min`,conseil:`Marée montante — vagues longues. Encore ${fmtCD(180-ms)} de fenêtre.`,nextH,nextB};
    }
  }
  if(nextB){
    const ml=(nextB.t-now)/60000;
    if(ml<120) return{statut:'bientot',emoji:'🟡',texte:'Bientôt !',cd:`surf dans ${fmtCD(ml)}`,classe:'o',phase:'Descente',conseil:`La marée redescend. Dans ${fmtCD(ml)} les conditions seront idéales.`,nextH,nextB};
    return{statut:'non',emoji:'🔴',texte:'Pas idéal...',cd:`bonne session dans ${fmtCD(ml)}`,classe:'r',phase:'Marée haute',conseil:`Trop haute — vagues courtes. Prochaine bonne session dans ${fmtCD(ml)}.`,nextH,nextB};
  }
  return{statut:'non',emoji:'🔴',texte:'Pas idéal...',cd:'marée haute',classe:'r',conseil:'Attends la descente.',nextH,nextB};
}

// ── VERDICT BAIGNADE OCÉAN ────────────────────────────────
function verdictBaignadeOcean(points, now){
  const nextH=points?points.find(p=>p.haute&&p.t>now):null;
  const prevH=points?[...points].reverse().find(p=>p.haute&&p.t<=now):null;
  const minSinceHigh=prevH?(now-prevH.t)/60000:null;
  const minToHigh=nextH?(nextH.t-now)/60000:null;
  if(minSinceHigh!==null&&minSinceHigh<180){
    return{statut:'oui',emoji:'🟢',texte:'Baignade OK !',cd:`encore ${fmtCD(180-minSinceHigh)} d'eau calme`,classe:'g',conseil:'Eau calme autour de la marée haute. Restez dans les zones surveillées.',nextH};
  }
  if(minToHigh!==null&&minToHigh<120){
    return{statut:'bientot',emoji:'🟡',texte:'Bientôt !',cd:`eau calme dans ${fmtCD(minToHigh)}`,classe:'o',conseil:`La mer monte. Dans ${fmtCD(minToHigh)} meilleures conditions. Prudence avec les courants.`,nextH};
  }
  return{statut:'non',emoji:'🔴',texte:'Prudence !',cd:'risque de baïnes',classe:'r',conseil:'Marée basse — risque de baïnes et courants. Baignade déconseillée. Attendez la montée.',nextH};
}

      <div style="position:relative;height:18px;border-radius:99px;overflow:hidden;background:#f0f4f7;margin-bottom:8px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${seuilPct}%;background:#FCEBEB"></div>
        <div style="position:absolute;left:${seuilPct}%;top:0;height:100%;width:${Math.min(15,100-seuilPct)}%;background:#FAEEDA"></div>
        <div style="position:absolute;left:${Math.min(seuilPct+15,100)}%;top:0;height:100%;width:${Math.max(0,100-seuilPct-15)}%;background:#E1F5EE"></div>
        <div style="position:absolute;top:50%;left:${pct}%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:${zone};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);z-index:2"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#8a9eaa;margin-bottom:6px">
        <span>Basse</span><span>${pid==='bateau'?'Navigable':'Genoux'}</span><span>Haute</span>
      </div>
      <div style="font-size:13px;font-weight:600;color:${zone};text-align:center">${label}</div>
    </div>`;
  }

  // Fenêtre utile
  let fenetreHTML='';
  if(!isOcean&&v.fen&&v.fen.debut&&v.fen.fin){
    fenetreHTML=`
    <div class="fenetre-card">
      <div class="fen-title">⏱ Plage d'eau utile aujourd'hui</div>
      <div class="fen-slots">
        <div class="fen-slot${now<v.fen.debut?' ':now>v.fen.fin?' passed':' active'}">
          <div class="fen-slot-lbl">Début</div>
          <div class="fen-slot-time">${fmtH(v.fen.debut)}</div>
          <div class="fen-slot-info">${now<v.fen.debut?'dans '+fmtCD((v.fen.debut-now)/60000):'passé'}</div>
        </div>
        <div style="display:flex;align-items:center;font-size:20px;color:var(--teal);padding:0 4px">→</div>
        <div class="fen-slot${now>=v.fen.debut&&now<=v.fen.fin?' active':now>v.fen.fin?' passed':''}">
          <div class="fen-slot-lbl">Fin</div>
          <div class="fen-slot-time">${fmtH(v.fen.fin)}</div>
          <div class="fen-slot-info">${now<v.fen.fin?'encore '+fmtCD((v.fen.fin-now)/60000):'terminé'}</div>
        </div>
        <div style="display:flex;align-items:center;font-size:18px;color:#8a9eaa;padding:0 4px">⏱</div>
        <div class="fen-slot">
          <div class="fen-slot-lbl">Durée</div>
          <div class="fen-slot-time">${fmtCD((v.fen.fin-v.fen.debut)/60000)}</div>
          <div class="fen-slot-info">${pid==='bateau'?'nav. possible':'eau suffisante'}</div>
        </div>
      </div>
    </div>`;
  }

  const bp=bps[bpIdx%bps.length];
  const bpHTML=v.statut==='oui'?`<div class="bonplan"><div class="bonplan-icon">${bp.icon}</div><div class="bonplan-txt"><strong>${bp.titre}</strong>${bp.txt}<a class="bonplan-cta" href="${bp.url}">${bp.cta}</a></div></div>`:'';
  const alerteHTML=v.alerte?`<div class="alerte">⚠️ <span>${v.alerte}</span></div>`:'';

  // Points hautes/basses du jour
  const refH=points?([...points].reverse().find(p=>p.haute&&p.t<=now)||points.find(p=>p.haute)):null;
  const refB=points?([...points].reverse().find(p=>!p.haute&&p.t<=now)||points.find(p=>!p.haute)):null;
  const nextHpt=points?points.find(p=>p.haute&&p.t>now):null;
  const nextBpt=points?points.find(p=>!p.haute&&p.t>now):null;

  document.getElementById('main').innerHTML=`
<div style="text-align:center;margin-bottom:8px">
  <span style="display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:${isOcean?'var(--surf-light)':'#E1F5EE'};color:${isOcean?'var(--surf)':'var(--bleu)'}">
    ${isOcean?'🌊 Océan':'🏖️ Bassin'} · ${lieu}
  </span>
</div>
<div class="verdict">
  <span class="v-em">${v.emoji}</span>
  <div class="v-txt">${v.texte}</div>
  <span class="v-cd cd-${v.classe}">${v.cd}</span>
</div>
<div class="conseil ${v.classe}">${v.conseil}</div>
${alerteHTML}
${fenetreHTML}
${barreHTML}
${bpHTML}
<div class="activites">
  <div class="act-title">En ce moment — ${lieu}</div>
  ${acts.map(a=>`<div class="act-item">${a}</div>`).join('')}
</div>
<div class="courbe-card">
  <div style="font-size:11px;color:#6a8090;margin-bottom:10px">
    ${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
    ${!isOcean?'· <span style="color:#EF9F27">— — —</span> seuil eau utile':''}
  </div>
  <div style="position:relative;height:70px;width:100%">
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none">
      ${zones}
      <polyline points="${poly}" fill="none" stroke="${sc}" stroke-width="2"/>
      ${seuilLine}
      <line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="${sc}" stroke-width="1.5" stroke-dasharray="3,2"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${sc}" stroke="#fff" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="time-axis"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span></div>
  <div class="tide-boxes">
    <div class="tb">
      <div class="tb-l">${refB&&refB.t<=now?'Dernière basse':'Prochaine basse'}</div>
      <div class="tb-v">${refB?fmtH(refB.t):'--:--'}</div>
      <div class="tb-s">${refB?refB.h.toFixed(2)+' m':''}</div>
    </div>
    <div class="tb">
      <div class="tb-l">${refH&&refH.t<=now?'Dernière haute':'Prochaine haute'}</div>
      <div class="tb-v">${refH?fmtH(refH.t):'--:--'}</div>
      <div class="tb-s">${refH?'Coeff. '+refH.coeff:''}</div>
    </div>
  </div>
</div>
<div style="display:flex;gap:8px;margin-bottom:10px">
  ${nextHpt?`<div style="flex:1;background:#fff;border-radius:12px;padding:11px;text-align:center;box-shadow:0 1px 6px rgba(10,61,92,.06)"><div style="font-size:10px;color:#7a8e9a">Prochaine haute</div><div style="font-size:15px;font-weight:700;color:var(--bleu);font-family:monospace;margin-top:2px">${fmtH(nextHpt.t)}</div><div style="font-size:10px;color:#8a9eaa;margin-top:2px">coeff. ${nextHpt.coeff}</div></div>`:''}
  ${nextBpt?`<div style="flex:1;background:#fff;border-radius:12px;padding:11px;text-align:center;box-shadow:0 1px 6px rgba(10,61,92,.06)"><div style="font-size:10px;color:#7a8e9a">Prochaine basse</div><div style="font-size:15px;font-weight:700;color:var(--bleu);font-family:monospace;margin-top:2px">${fmtH(nextBpt.t)}</div></div>`:''}
</div>
<div class="shom-badge"><span>📊 Données SHOM officielles 2026 · Arcachon</span></div>
<button class="rfbtn" onclick="render()">↻ Actualiser</button>`;
}

function renderLieux(){
  document.getElementById('lieux').innerHTML=LIEUX[mode].map(l=>
    `<span class="cb${l===lieu?' on-'+mode:''}" onclick="selLieu('${l}')">${l}</span>`).join('');
}
function renderProfils(){
  document.getElementById('profiles').innerHTML=PROFILS[mode].map(p=>
    `<button class="pb${p.id===profil.id?' on-'+mode:''}" onclick="selProfil('${p.id}')">${p.label}</button>`).join('');
}
function setMode(m){
  mode=m; lieu=LIEUX[m][0]; profil=PROFILS[m][0];
  document.getElementById('btn-bassin').className='mode-btn'+(m==='bassin'?' on':'');
  document.getElementById('btn-ocean').className='mode-btn'+(m==='ocean'?' on':'');
  renderLieux(); renderProfils(); render();
}
function selLieu(l){lieu=l;renderLieux();render();}
function selProfil(id){profil=PROFILS[mode].find(p=>p.id===id);renderProfils();render();}
function refresh(){bpIdx++;render();}

renderLieux(); renderProfils(); render();
setInterval(()=>render(),60000); // refresh toutes les minutes

// Horloge
function tick(){
  const now=new Date();
  const el=document.getElementById('horloge');
  if(el) el.textContent=`${now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})} · ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
tick(); setInterval(tick,1000);

// PWA install
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('install-banner')&&(document.getElementById('install-banner').style.display='flex');});
</script>
</body>
</html>
